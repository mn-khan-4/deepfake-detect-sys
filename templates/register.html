<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Create Account — DEEPRUST</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="auth-page">
        <div class="bg-grid"></div>
        <div class="bg-radial"></div>

        <div class="auth-logo">
            <div class="auth-logo-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
                </svg>
            </div>
            <h1>DEEPRUST</h1>
            <p>DEEPFAKE DETECTION SYSTEM</p>
        </div>

        <div class="auth-card">
            <h2>Create account</h2>
            <p class="auth-subtitle">Start detecting deepfakes</p>

            <form id="registerForm">
                <div class="form-group">
                    <label class="form-label">USERNAME</label>
                    <input class="form-input" type="text" id="regUsername"
                           placeholder="johndoe" autocomplete="username" required>
                </div>
                <div class="form-group">
                    <label class="form-label">EMAIL</label>
                    <input class="form-input" type="email" id="regEmail"
                           placeholder="you@example.com" autocomplete="email" required>
                </div>
                <div class="form-group">
                    <label class="form-label">PASSWORD</label>
                    <input class="form-input" type="password" id="regPassword"
                           placeholder="••••••••" autocomplete="new-password" required>
                </div>
                <div class="form-group">
                    <label class="form-label">CONFIRM PASSWORD</label>
                    <input class="form-input" type="password" id="regConfirm"
                           placeholder="••••••••" autocomplete="new-password" required>
                </div>
                <div id="registerError" style="display:none; color:var(--accent-red); font-size:0.8125rem;
                     margin-top:0.5rem; padding:0.625rem 0.875rem; text-align:center;
                     background:rgba(255,71,87,0.08); border:1px solid rgba(255,71,87,0.25);
                     border-radius:var(--radius-sm);"></div>
                <button type="submit" class="auth-submit-btn" id="registerBtn">Create Account</button>
            </form>

            <div class="auth-footer">
                Already have an account? <a href="{{ url_for('login') }}">Sign in</a>
            </div>
        </div>

        <div class="auth-skip">
            <a href="{{ url_for('landing') }}">
                Continue without account
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M5 12h14M12 5l7 7-7 7"/>
                </svg>
            </a>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    <script>
        // Inline — guaranteed to run regardless of main.js caching issues
        document.getElementById('registerForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const btn      = document.getElementById('registerBtn');
            const error    = document.getElementById('registerError');
            const username = document.getElementById('regUsername').value.trim();
            const email    = document.getElementById('regEmail').value.trim();
            const password = document.getElementById('regPassword').value;
            const confirm  = document.getElementById('regConfirm').value;

            // Client-side validation
            if (password !== confirm) {
                error.textContent   = 'Passwords do not match.';
                error.style.display = 'block';
                return;
            }
            if (password.length < 8) {
                error.textContent   = 'Password must be at least 8 characters.';
                error.style.display = 'block';
                return;
            }

            btn.disabled    = true;
            btn.textContent = 'Creating account...';
            error.style.display = 'none';

            try {
                const fd = new FormData();
                fd.append('username', username);
                fd.append('email',    email);
                fd.append('password', password);
                fd.append('confirm',  confirm);

                const res  = await fetch('/api/auth/register', { method: 'POST', body: fd });
                const data = await res.json();

                if (data.success) {
                    window.location.href = data.redirect || '/home';
                } else {
                    error.textContent    = data.error || 'Registration failed. Please try again.';
                    error.style.display  = 'block';
                    btn.disabled         = false;
                    btn.textContent      = 'Create Account';
                }
            } catch (err) {
                error.textContent   = 'Network error. Please try again.';
                error.style.display = 'block';
                btn.disabled        = false;
                btn.textContent     = 'Create Account';
            }
        });
    </script>
</body>
</html>
