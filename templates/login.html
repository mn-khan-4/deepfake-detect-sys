<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Sign In — DEEPRUST</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="auth-page">
        <div class="bg-grid"></div>
        <div class="bg-radial"></div>

        <div class="auth-logo">
            <div class="auth-logo-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
                </svg>
            </div>
            <h1>DEEPRUST</h1>
            <p>DEEPFAKE DETECTION SYSTEM</p>
        </div>

        <div class="auth-card">
            <h2>Welcome back</h2>
            <p class="auth-subtitle">Sign in to continue</p>

            <form id="loginForm">
                <div class="form-group">
                    <label class="form-label">EMAIL</label>
                    <input class="form-input" type="email" id="loginEmail"
                           placeholder="you@example.com" autocomplete="email" required>
                </div>
                <div class="form-group">
                    <label class="form-label">PASSWORD</label>
                    <input class="form-input" type="password" id="loginPassword"
                           placeholder="••••••••" autocomplete="current-password" required>
                </div>
                <div id="loginError" style="display:none; color:var(--accent-red); font-size:0.8125rem;
                     margin-top:0.5rem; padding:0.625rem 0.875rem; text-align:center;
                     background:rgba(255,71,87,0.08); border:1px solid rgba(255,71,87,0.25);
                     border-radius:var(--radius-sm);"></div>
                <button type="submit" class="auth-submit-btn" id="loginBtn">Sign In</button>
            </form>

            <div class="auth-footer">
                Don't have an account? <a href="{{ url_for('register') }}">Create one</a>
            </div>
        </div>

        <div class="auth-skip">
            <a href="{{ url_for('landing') }}">
                Continue without account
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M5 12h14M12 5l7 7-7 7"/>
                </svg>
            </a>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    <script>
        // Inline fallback — works even if main.js has a load issue
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const btn   = document.getElementById('loginBtn');
            const error = document.getElementById('loginError');
            const email = document.getElementById('loginEmail').value.trim();
            const pass  = document.getElementById('loginPassword').value;

            btn.disabled    = true;
            btn.textContent = 'Signing in...';
            error.style.display = 'none';

            try {
                const fd = new FormData();
                fd.append('email', email);
                fd.append('password', pass);

                const res  = await fetch('/api/auth/login', { method: 'POST', body: fd });
                const data = await res.json();

                if (data.success) {
                    window.location.href = data.redirect || '/home';
                } else {
                    error.textContent    = data.error || 'Login failed. Please try again.';
                    error.style.display  = 'block';
                    btn.disabled         = false;
                    btn.textContent      = 'Sign In';
                }
            } catch (err) {
                error.textContent   = 'Network error. Please try again.';
                error.style.display = 'block';
                btn.disabled        = false;
                btn.textContent     = 'Sign In';
            }
        });
    </script>
</body>
</html>
